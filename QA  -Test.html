<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}
.container{
    background:#fff;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
h1{
    font-size:90px;
    color:#ff4d4d;
}
h2{
    margin:10px 0;
    color:#333;
}
p{
    color:#666;
    margin:20px 0;
}
a{
    display:inline-block;
    padding:12px 25px;
    background:#007bff;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}
a:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Sorry, the page you are looking for doesn't exist.</p>
    <a href="/">Go to Home</a>
</div>

</body>
</html>
